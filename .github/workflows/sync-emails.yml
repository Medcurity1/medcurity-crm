name: Sync Emails (cron)

# Triggers the sync-emails Supabase Edge Function every 10 minutes.
#
# STATUS (2026-07-10): this workflow is now the REDUNDANT SAFETY NET, not the
# primary trigger. pg_cron + pg_net (migration 20260710130000, jobname
# email_sync_every_10_min) is primary — it fires on an exact clock inside
# Postgres, while GitHub throttles this schedule badly (observed median gap
# ~100 min, max 4.4 h). The function's scheduler-overlap lock makes
# double-triggering harmless, so keep this running during the transition;
# once pg_cron cadence is verified (select * from
# public.v_email_sync_schedule_status; plus steady ~10-min email_sync_runs
# rows), this file can be deleted.
#
# History: this workflow originally REPLACED the pg_cron schedule
# (2026-04-30, commit 5d95440) because pg_net 0.20 had a worker-level
# regression on hosted Supabase ("Quote command returned error" on every
# net.http_post call). pg_net has since worked on this stack — the
# task-reminders 5-min job (migration 20260522000003) uses the identical
# GUC-driven pattern and is live.

on:
  schedule:
    # Every 10 minutes. GitHub's minimum granularity is 5 minutes; */10 is fine.
    # GitHub may delay or skip runs under heavy load — see workflow_dispatch
    # below for the manual recovery path.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# Only one sync should run at a time. If a 10-minute interval slips,
# skip the queued run rather than stacking up — the next tick will catch up.
concurrency:
  group: sync-emails
  cancel-in-progress: false

# Lets the failure-alert steps open/close a GitHub issue with the built-in token.
permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST to sync-emails Edge Function
        env:
          SUPABASE_SYNC_URL: ${{ secrets.SUPABASE_SYNC_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_SYNC_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::SUPABASE_SYNC_URL and SUPABASE_SERVICE_ROLE_KEY repository secrets must be set."
            exit 1
          fi
          # Strip any stray whitespace/newline the stored secret may carry — a
          # trailing newline breaks the function's exact-match auth gate (added
          # 2026-07-04) even though the key value is correct. JWTs contain no
          # whitespace, so this is always safe.
          # Strip any stray whitespace/newline the stored secret may carry.
          KEY="$(printf '%s' "${SUPABASE_SERVICE_ROLE_KEY}" | tr -d '[:space:]')"
          URL="$(printf '%s' "${SUPABASE_SYNC_URL}" | tr -d '[:space:]')"
          # -f makes curl exit non-zero on HTTP >=400 so the Action fails loudly.
          curl -fsS --max-time 240 \
            -X POST \
            -H "Authorization: Bearer ${KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${URL}"
          echo
          echo "Sync triggered successfully."

      # Self-healing alert: open a GitHub issue the moment the sync cron fails,
      # and auto-close it once a run succeeds. Uses the built-in token — no new
      # secrets. Prevents another silent multi-day email-sync outage.
      - name: Open alert issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          # No checkout step, so gh can't infer the repo from a git remote —
          # without GH_REPO every gh call errors (and the || true guards
          # would swallow it, silently disabling the alert).
          GH_REPO: ${{ github.repository }}
        run: |
          existing="$(gh issue list --state open --search 'Email sync cron is failing in:title' --json number -q '.[0].number' 2>/dev/null || true)"
          if [ -z "$existing" ]; then
            gh issue create \
              --title "🔴 Email sync cron is failing" \
              --body "The scheduled email sync failed. Latest run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} — this issue opens automatically on failure and closes automatically once a sync run succeeds." >/dev/null || true
          fi

      - name: Close alert issue on recovery
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          for n in $(gh issue list --state open --search 'Email sync cron is failing in:title' --json number -q '.[].number' 2>/dev/null || true); do
            gh issue close "$n" --comment "✅ Email sync recovered (run ${{ github.run_id }})." >/dev/null 2>&1 || true
          done
