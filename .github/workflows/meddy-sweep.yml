name: Meddy Sweep (cron)

# Scheduled safety net for Meddy: missed-chat alerts (5 min), Pushover
# escalation (2 min), stale-agent availability cleanup. Replaces OG
# Nexus's in-memory timers (which died on restart). NOTE on timing:
# GitHub Actions' real scheduling floor is ~5 minutes with added jitter,
# so these sweeps fire roughly every 5-15 minutes regardless of the cron
# string — the "2 minute" escalation is therefore "2 minutes after the
# request, checked at the next sweep". The sweep's DB-flag idempotency
# is what makes that safe. Same external-scheduler pattern as
# sync-emails (pg_net is unreliable for HTTP from Postgres).
#
# Hits BOTH environments so staging Meddy testing behaves like prod.
# The function no-ops cheaply when there's nothing to do.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: meddy-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      # -fsS surfaces HTTP >=400 as a visible error in the run log; the
      # trailing `|| true` deliberately keeps the every-5-min step green so
      # a transient blip doesn't spam red runs (the next sweep retries in
      # ~5 min). Sustained breakage still shows as error lines in every log.
      - name: Sweep staging
        env:
          URL: ${{ secrets.STAGING_VITE_SUPABASE_URL }}
          KEY: ${{ secrets.STAGING_VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$URL" ] || [ -z "$KEY" ]; then echo "staging secrets unset; skipping"; exit 0; fi
          curl -fsS --max-time 120 -X POST "$URL/functions/v1/meddy-sweep" \
            -H "Authorization: Bearer $KEY" -H "apikey: $KEY" \
            -H "Content-Type: application/json" -d '{}' | head -c 300 || true
      - name: Sweep production
        env:
          URL: ${{ secrets.PRODUCTION_VITE_SUPABASE_URL }}
          KEY: ${{ secrets.PRODUCTION_VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$URL" ] || [ -z "$KEY" ]; then echo "production secrets unset; skipping"; exit 0; fi
          curl -fsS --max-time 120 -X POST "$URL/functions/v1/meddy-sweep" \
            -H "Authorization: Bearer $KEY" -H "apikey: $KEY" \
            -H "Content-Type: application/json" -d '{}' | head -c 300 || true
