name: Azure Static Web Apps CI/CD (Staging)

on:
  push:
    branches:
      - Staging
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - Staging

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_VITE_SUPABASE_ANON_KEY }}

      - name: Run Supabase Migrations (Staging)
        # Mirrors the prod workflow's migration step. Without this,
        # everything in supabase/migrations/*.sql only gets applied
        # to prod (on merge to main) — staging never picks them up,
        # so the staging DB drifts further out of sync with every push.
        run: |
          npx supabase link --project-ref $SUPABASE_PROJECT_REF
          npx supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}

      - name: Deploy Edge Functions (Staging)
        # Staging previously deployed no edge functions. Now mirrors the
        # prod list (21 CI-managed functions) so function changes are
        # validated + testable on staging (and staging/prod function code
        # stays in sync). outlook-oauth is called by Microsoft and
        # meddy-chat / meddy-support serve the public website widget, so
        # those three need --no-verify-jwt; the rest keep JWT verification.
        #
        # NOT deployed by CI — manual `supabase functions deploy` only, so
        # merging changes to these does NOT ship them anywhere:
        #   clickup-services-sync  --no-verify-jwt  (pg_cron caller)
        #   crm-mcp                --no-verify-jwt  (prod-only read-only MCP)
        #   pandadoc-sync          --no-verify-jwt  (PandaDoc webhook)
        # (inbound-lead and nexus-activity both moved INTO this CI list —
        #  2026-07-20, and PROD's list too at the retirement cutover, so
        #  both envs now auto-deploy them; 21 CI-managed functions total, +campaign-webhooks 2026-07-22.)
        # WARNING: clickup-sf-id-sync is live on prod (cron migration
        # 20260429000002 + scripts/migration/clickup-prod-bootstrap*.sql
        # POST to it daily) but its source was never committed to this
        # repo. Before ever redeploying or deleting it, recover the
        # deployed source with:
        #   npx supabase functions download clickup-sf-id-sync \
        #     --project-ref igmwomnkbbsytihtvhbp
        # and commit it under supabase/functions/clickup-sf-id-sync/.
        run: |
          set -e
          npx supabase link --project-ref $SUPABASE_PROJECT_REF
          npx supabase functions deploy outlook-oauth --no-verify-jwt
          # sync-emails + outlook-calendar-sync gate on the token's VERIFIED
          # role claim, so they deploy WITH jwt verification ON (default): the
          # gateway verifies the signature, the function trusts role=service_role.
          # Do NOT add --no-verify-jwt here — that would let a forged role claim
          # through. (Exact-key-match here caused the 2026-07-05 email outage.)
          npx supabase functions deploy sync-emails
          npx supabase functions deploy outlook-calendar-sync
          npx supabase functions deploy task-reminders
          npx supabase functions deploy task-digest
          npx supabase functions deploy product-request-action
          npx supabase functions deploy request-email-notify
          npx supabase functions deploy meddy-chat --no-verify-jwt
          npx supabase functions deploy meddy-support --no-verify-jwt
          npx supabase functions deploy meddy-staff-action
          npx supabase functions deploy meddy-sweep
          npx supabase functions deploy meddy-weekly-report
          npx supabase functions deploy meddy-crawl
          npx supabase functions deploy playbook-ai
          npx supabase functions deploy playbook-smartlead
          npx supabase functions deploy playbook-mailchimp
          npx supabase functions deploy ask-ai
          npx supabase functions deploy partner-contract-summary
          npx supabase functions deploy invite-user
          # STAGING-ONLY (2026-07-20, lead-type retirement piece 2): the
          # public website-form endpoint, now writing contacts. Prod stays
          # manual-deploy; the X-API-Key secret gates callers either way.
          npx supabase functions deploy inbound-lead --no-verify-jwt
          # nexus-activity joins CI too (2026-07-20): the retirement version
          # drops the lead-fallback; the old prod copy was logging onto
          # archived tombstone leads.
          npx supabase functions deploy nexus-activity --no-verify-jwt
          # campaign-webhooks (Campaigns overhaul Phase 2, S5, 2026-07-22):
          # Smartlead's servers POST here, not an authenticated browser —
          # --no-verify-jwt like the other inbound webhook endpoints
          # (pandadoc-sync, inbound-lead). Auth is a per-campaign
          # ?token=<webhook_secret> the function checks itself.
          npx supabase functions deploy campaign-webhooks --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}

      - name: Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_GRASS_0AD59C510 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "/dist"
          api_location: ""
          output_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_GRASS_0AD59C510 }}
          action: "close"
