name: Azure Static Web Apps CI/CD (Production)

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.PRODUCTION_VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_VITE_SUPABASE_ANON_KEY }}

      - name: Run Supabase Migrations (Production)
        run: |
          npx supabase link --project-ref $SUPABASE_PROJECT_REF
          npx supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_SUPABASE_PROJECT_REF }}

      # Note: Outlook secrets (MICROSOFT_CLIENT_ID, MICROSOFT_CLIENT_SECRET,
      # OUTLOOK_OAUTH_REDIRECT_URI, APP_BASE_URL) are set manually in
      # Supabase Dashboard → prod project → Edge Functions → Secrets.
      # We only deploy the function code from CI; the secrets persist
      # across deploys.

      - name: Deploy Edge Functions (Production)
        # Deploys the three Outlook-related edge functions. The
        # outlook-oauth callback receives requests from Microsoft
        # (not an authenticated browser), so it needs --no-verify-jwt.
        run: |
          set -e
          npx supabase link --project-ref $SUPABASE_PROJECT_REF
          npx supabase functions deploy outlook-oauth --no-verify-jwt
          npx supabase functions deploy sync-emails
          npx supabase functions deploy outlook-calendar-sync
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_SUPABASE_PROJECT_REF }}

      - name: Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_FLOWER_0F9685910 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "/dist"
          api_location: ""
          output_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_FLOWER_0F9685910 }}
          action: "close"
