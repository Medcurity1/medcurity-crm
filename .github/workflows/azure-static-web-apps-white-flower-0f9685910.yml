name: Azure Static Web Apps CI/CD (Production)

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.PRODUCTION_VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_VITE_SUPABASE_ANON_KEY }}

      - name: Run Supabase Migrations (Production)
        run: |
          npx supabase link --project-ref $SUPABASE_PROJECT_REF
          npx supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_SUPABASE_PROJECT_REF }}

      # Note: Outlook secrets (MICROSOFT_CLIENT_ID, MICROSOFT_CLIENT_SECRET,
      # OUTLOOK_OAUTH_REDIRECT_URI, APP_BASE_URL) are set manually in
      # Supabase Dashboard → prod project → Edge Functions → Secrets.
      # We only deploy the function code from CI; the secrets persist
      # across deploys.

      - name: Deploy Edge Functions (Production)
        # Deploys every CI-managed edge function (18 today): the Outlook
        # trio, task-reminders/task-digest, product-request +
        # request-email-notify, the Meddy suite, the Playbook suite,
        # ask-ai, and invite-user. outlook-oauth receives requests from
        # Microsoft (not an authenticated browser) and meddy-chat /
        # meddy-support serve the public website widget, so those three
        # need --no-verify-jwt; everything else keeps JWT verification ON.
        #
        # NOT deployed by CI — manual `supabase functions deploy` only, so
        # merging changes to these does NOT ship them anywhere:
        #   clickup-services-sync  --no-verify-jwt  (pg_cron caller)
        #   crm-mcp                --no-verify-jwt  (prod-only read-only MCP)
        #   (inbound-lead moved INTO this CI list 2026-07-20 — see below.)
        #   nexus-activity         --no-verify-jwt  (Nexus feed shim)
        #   pandadoc-sync          --no-verify-jwt  (PandaDoc webhook)
        # WARNING: clickup-sf-id-sync is live on prod (cron migration
        # 20260429000002 + scripts/migration/clickup-prod-bootstrap*.sql
        # POST to it daily) but its source was never committed to this
        # repo. Before ever redeploying or deleting it, recover the
        # deployed source with:
        #   npx supabase functions download clickup-sf-id-sync \
        #     --project-ref igmwomnkbbsytihtvhbp
        # and commit it under supabase/functions/clickup-sf-id-sync/.
        run: |
          set -e
          npx supabase link --project-ref $SUPABASE_PROJECT_REF
          npx supabase functions deploy outlook-oauth --no-verify-jwt
          # sync-emails + outlook-calendar-sync gate on the token's VERIFIED
          # role claim, so they deploy WITH jwt verification ON (default): the
          # gateway verifies the signature, the function trusts role=service_role.
          # Do NOT add --no-verify-jwt here — that would let a forged role claim
          # through. (Exact-key-match here caused the 2026-07-05 email outage.)
          npx supabase functions deploy sync-emails
          npx supabase functions deploy outlook-calendar-sync
          npx supabase functions deploy task-reminders
          npx supabase functions deploy task-digest
          npx supabase functions deploy product-request-action
          npx supabase functions deploy request-email-notify
          npx supabase functions deploy meddy-chat --no-verify-jwt
          npx supabase functions deploy meddy-support --no-verify-jwt
          npx supabase functions deploy meddy-staff-action
          npx supabase functions deploy meddy-sweep
          npx supabase functions deploy meddy-weekly-report
          npx supabase functions deploy meddy-crawl
          npx supabase functions deploy playbook-ai
          npx supabase functions deploy playbook-smartlead
          npx supabase functions deploy playbook-mailchimp
          npx supabase functions deploy ask-ai
          npx supabase functions deploy invite-user
          # inbound-lead joins CI on PROD at the lead-retirement cutover
          # (2026-07-20): the contacts-version IS the intended live behavior
          # now, so the fn swap ships atomically with the promote instead of
          # as a dangling manual step. X-API-Key still gates callers.
          npx supabase functions deploy inbound-lead --no-verify-jwt
          # nexus-activity joins CI too (2026-07-20): the retirement version
          # drops the lead-fallback; the old prod copy was logging onto
          # archived tombstone leads.
          npx supabase functions deploy nexus-activity --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_SUPABASE_PROJECT_REF }}

      - name: Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_FLOWER_0F9685910 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "/dist"
          api_location: ""
          output_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_FLOWER_0F9685910 }}
          action: "close"
