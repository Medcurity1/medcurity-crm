name: Playbook Weekly Ideas (cron)

# Triggers the playbook-ai Edge Function's "generate-ideas" action once a
# week, so the Playbook always has a fresh set of AI marketing ideas for
# the current week waiting on Monday morning.
#
# Same external-scheduler approach as sync-emails.yml (pg_net 0.20 has a
# worker-level regression on hosted Supabase). The target URL is derived
# from SUPABASE_SYNC_URL by swapping the function name, so no extra secret
# is needed.
#
# generate-ideas is idempotent per ISO week (keyed to the week's Monday),
# so an occasional double-run is harmless.
#
# STATUS (2026-07-10): this workflow is MANUALLY DISABLED in the GitHub
# Actions UI (disabled alongside playbook-smartlead-sync after its
# scheduled runs from main failed 403 on 2026-06-24..26 — SUPABASE_SYNC_URL
# points at prod and Playbook is staging-only, so the playbook-ai
# function/config don't exist on prod yet; this one never got a run in).
# Merging to main does NOT re-enable a manually-disabled workflow. At
# Playbook promotion (see DOCKET): (1) deploy/config the playbook
# functions on prod, (2) re-enable this workflow in the Actions UI
# (gh workflow enable playbook-weekly-ideas.yml).

on:
  schedule:
    # Mondays at 13:00 UTC (after the morning automation window).
    - cron: "0 13 * * 1"
  workflow_dispatch: {}

concurrency:
  group: playbook-weekly-ideas
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST generate-ideas to playbook-ai
        env:
          SUPABASE_SYNC_URL: ${{ secrets.SUPABASE_SYNC_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_SYNC_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::SUPABASE_SYNC_URL and SUPABASE_SERVICE_ROLE_KEY repository secrets must be set."
            exit 1
          fi
          # Strip any stray whitespace/newline the stored secrets may carry —
          # a trailing newline in this same secret once broke sync-emails'
          # auth gate. JWTs and URLs contain no whitespace, so always safe.
          KEY="$(printf '%s' "${SUPABASE_SERVICE_ROLE_KEY}" | tr -d '[:space:]')"
          URL="$(printf '%s' "${SUPABASE_SYNC_URL}" | tr -d '[:space:]')"
          PLAYBOOK_AI_URL="${URL/sync-emails/playbook-ai}"
          curl -fsS --max-time 240 \
            -X POST \
            -H "Authorization: Bearer ${KEY}" \
            -H "Content-Type: application/json" \
            -d '{"action":"generate-ideas"}' \
            "${PLAYBOOK_AI_URL}"
          echo
          echo "Weekly ideas generation triggered."
